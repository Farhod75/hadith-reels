name: Hadith Reels CI/CD

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      run_audit:
        description: 'Run audit tests against production'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

jobs:
  test:
    name: Playwright Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      # ── P043/P045: Only mocked/fast tests in CI push
      - name: Run E2E tests
        run: npx playwright test tests/hadith-reels.spec.ts --reporter=list --workers=1 --project=chromium
        env:
          BASE_URL: https://hadith-reels.vercel.app
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        continue-on-error: true

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Upload screenshots on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-screenshots
          path: test-results/
          retention-days: 7
